name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xz

      - name: Run tests
        run: make test

      - name: Build release binary (static liblzma)
        run: |
          make clean
          make LIBS="$(brew --prefix)/lib/liblzma.a -lxar"

      - name: Verify only system dylibs linked
        run: |
          otool -L pbzx
          if otool -L pbzx | tail -n +2 | grep -v '/usr/lib/' | grep -q .; then
            echo "ERROR: Binary links against non-system dylibs:"
            otool -L pbzx | tail -n +2 | grep -v '/usr/lib/'
            exit 1
          fi

      - name: Rename binary
        run: mv pbzx pbzx-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: pbzx-darwin-arm64
          path: pbzx-darwin-arm64

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x pbzx-darwin-*
          tag="${{ github.ref_name }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              --clobber \
              pbzx-darwin-arm64
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              pbzx-darwin-arm64
          fi
